# yaml-language-server: $schema=https://docs.coderabbit.ai/schema.json
language: en-US

reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  review_status: true
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
  path_filters:
    - "!**/pnpm-lock.yaml"

chat:
  auto_reply: true
